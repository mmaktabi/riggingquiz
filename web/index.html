<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="RiggingQuiz - Antworte Fragen im Veranstaltungstechnik Bereich">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="RiggingQuiz">
  <link rel="apple-touch-icon" href="favicon.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>RiggingQuiz</title>
  <link rel="manifest" href="manifest.json">

  <script>
    const serviceWorkerVersion = '{{flutter_service_worker_version}}';
  </script>
  <script src="flutter.js" defer></script>
  <style>
    body {
      background-color: #f8f9fa;
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      flex-direction: column;
    }
    .loading {
      display: flex;
      justify-content: center;
      align-items: center;
      width: 99%;
      padding: 5px;
      position: relative;
    }
    .spinner-border {
      width: 275px;
      height: 275px;
      border-radius: 50%;
      border: 8px solid transparent; /* Unsichtbarer Rand */
      border-top: 8px solid #00315E; /* Sichtbare obere Linie */
      display: flex;
      justify-content: center;
      align-items: center;
      animation: spin 2s linear infinite; /* Nur der Rand wird animiert */
      position: relative;
    }
    .circle-image {
      width: 272px;
      height: 272px;
      border-radius: 50%;
      background-image: url('favicon.png');
      background-size: cover;
      background-position: center;
      position: absolute; /* Statisch im Zentrum */
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
<div class="loading">
  <div class="spinner-border">
  </div>
</div>
<div class="circle-image"></div>

<script type="text/javascript">
</script>
<script>
  window.addEventListener('load', function(ev) {
    {{flutter_js}}
    {{flutter_build_config}}

    _flutter.loader.load({
      serviceWorker: {
        serviceWorkerVersion: serviceWorkerVersion,
      },
      onEntrypointLoaded: function(engineInitializer) {
        engineInitializer.initializeEngine().then(function(appRunner) {
          appRunner.runApp();
        });
      }
    });
  });
</script>

</body>
</html>
